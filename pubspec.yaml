name: fintrack
description: Personal Finance Tracking App for DataGroup Academy
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.7

  # Local database (Drift / SQLite)
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # HTTP client
  dio: ^5.7.0

  # Charts
  fl_chart: ^0.69.0

  # Session storage
  shared_preferences: ^2.3.3
  dartz: ^0.10.1
  firebase_auth: ^6.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.3
  intl: ^0.20.2
  get_it: ^9.2.1
  pdf: ^3.12.0
  printing: ^5.14.3
  firebase_core: ^4.7.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.3
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  mocktail: ^1.0.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/